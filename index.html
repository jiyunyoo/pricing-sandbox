<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 프라이싱 샌드박스 데모</title>
    <style>
        /* 화면 디자인 (CSS) */
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .dashboard { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; padding: 15px; background: #eef2f5; border-radius: 8px; }
        .metrics { display: flex; gap: 15px; margin-bottom: 20px; }
        .metric-card { flex: 1; padding: 15px; background: #fff; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        .metric-card h3 { margin: 0 0 10px 0; font-size: 14px; color: #666; }
        .metric-card .value { font-size: 24px; font-weight: bold; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        .flip { color: white; background-color: #e74c3c; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .btn { padding: 10px 20px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn:hover { background-color: #2980b9; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h2>📊 AI 페르소나 가격 시뮬레이션</h2>
        
        <div class="controls">
            <div>
                <label>상품 선택:</label>
                <select id="productSelect">
                    <option value="monitor">🖥️ 모니터 (탐색재 - 30만원)</option>
                    <option value="cosmetics">💄 화장품 앰플 (경험재 - 6만원)</option>
                </select>
            </div>
            <div>
                <label>가격 인상률:</label>
                <select id="priceIncrease">
                    <option value="20">+20% 인상</option>
                </select>
            </div>
            <div>
                <label>토론 단계(커뮤니티 효과):</label>
                <input type="checkbox" id="discussionToggle" checked> ON
            </div>
            <button class="btn" onclick="runSimulation()">시뮬레이션 실행</button>
        </div>

        <div class="metrics">
            <div class="metric-card">
                <h3>가격 탄력성 (ε_sim)</h3>
                <div class="value" id="valElasticity">-</div>
            </div>
            <div class="metric-card">
                <h3>구전 승수 (WOM_m)</h3>
                <div class="value" id="valWom">-</div>
            </div>
            <div class="metric-card">
                <h3>McNemar 검정 (χ²)</h3>
                <div class="value" id="valMcnemar">-</div>
            </div>
        </div>

        <table id="resultTable">
            <thead>
                <tr>
                    <th>페르소나</th>
                    <th>특징</th>
                    <th>1차 결정 (개별)</th>
                    <th>2차 결정 (토론 후)</th>
                    <th>상태</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    </body>
</html>
